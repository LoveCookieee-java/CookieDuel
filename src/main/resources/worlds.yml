# CookieDuel world settings.
# Wild mode searches around a loaded world's spawn.
# Arena instance mode clones a template world for each accepted duel.

wild:
  # This world must already be loaded before CookieDuel starts.
  # The plugin will not auto-load it.
  world: "pvp_world"

  # Wild spawn search always starts from the world's spawn.
  # There is no custom center location here.
  use-random-safe-location: true

  # Distance between the two players.
  # 10.0 means each player lands about 5 blocks from center.
  spawn-distance: 10.0

  # Keeps both sides on roughly the same height.
  max-y-difference: 1

  random-location:
    min-radius: 500
    max-radius: 3000
    max-attempts: 48
    avoid-water: true
    avoid-lava: true
    avoid-dangerous-blocks: true
    avoid-nearby-players-radius: 32

  terrain-validation:
    # Samples nearby columns so obviously rough terrain can be skipped.
    local-sample-radius: 2

    # Maximum local height spread allowed around one spawn.
    max-local-height-spread: 2

    # Keeps both sides close in terrain roughness.
    max-local-height-spread-difference: 1

    # Rejects obvious ledges and bad edge drops.
    edge-check-radius: 2
    max-edge-drop: 3

    # Rejects hazards and cramped blocks near the starting area.
    nearby-hazard-check-radius: 2
    nearby-obstruction-check-radius: 1

arena-instance:
  # Player-created arena queues use this template unless you change the code to select another one.
  default-template: "default"

  templates:
    default:
      enabled: true
      # This template folder must already exist in the server world container.
      template-world-name: "pvp_template"
      instance-world-prefix: "duel_instance_"

      spawn-a:
        x: -5.5
        y: 65.0
        z: 0.5
        yaw: 90.0
        pitch: 0.0

      spawn-b:
        x: 5.5
        y: 65.0
        z: 0.5
        yaw: -90.0
        pitch: 0.0

      settings:
        auto-set-gamerules: true
        allow-block-break: false
        allow-block-place: false
        border-size: 48
