# CookieDuel main settings.
# WILD is the main default mode.
# ARENA is optional.
# Enable exactly one mode at a time.
# If both modes are enabled or both are disabled, CookieDuel disables itself.

general:
  debug: false

modes:
  wild:
    # Main/default mode.
    enabled: true

  arena:
    # Optional mode. Turn this on only after your arena template world is ready.
    # If you enable ARENA, turn WILD off.
    enabled: false
    # Prevent too many temporary duel worlds from being active at once.
    max-active-instances: 3
    # Removes leftover duel worlds from old crashes or bad shutdowns.
    cleanup-leftovers-on-startup: true
    instance-create-timeout-seconds: 15
    instance-delete-timeout-seconds: 15

duel:
  # Delay between successful teleports and the fight starting.
  prestart-countdown-seconds: 5
  # Hard time limit for a duel before it is cancelled.
  max-fight-seconds: 300

anti-abuse:
  # Small queue spam protections.
  queue-join-cooldown-seconds: 3
  queue-leave-penalty-seconds: 10
  rematch-block-seconds: 60
