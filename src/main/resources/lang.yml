  arena-title-win-title: "&aVictory"
  arena-title-win-subtitle: "&fYou beat {opponent}"
  arena-title-lose-title: "&cDefeat"
  arena-title-lose-subtitle: "&fLost to {opponent}"

admin:
  reload-done: "&aCookieDuel configs reloaded."
  reload-failed: "&cReload failed: &f{reason}"
