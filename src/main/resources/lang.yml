# Main language file.
# Keep placeholders like {queue}, {id}, {owner}, {mode}, {money}, {player}, {kills}, {deaths}, {points}, {opponent}, {seconds}, {reason}, and {count}.

prefix: "&6CookieDuel &8» &r"

general:
  player-only: "&cOnly players can use that command."
  invalid-mode: "&cInvalid mode. Use &fWILD &cor &fARENA&c."

modes:
  wild: "WILD"
  arena: "ARENA"

queue:
  create-usage: "&eUse &f/cd queue <mode> &eto open a queue under your player name."
  created: "&aCreated your &f{mode} &aqueue under &f{owner}&a."
  removed: "&eRemoved your queue entry."
  not-in-queue: "&cYou don't have an active queue entry."
  already-own: "&cYou already have an active queue entry. Use &f/cd leave &cfirst."
  duplicate-id: "&cA queue is already using your player name right now."
  in-session: "&cYou can't do that while you're in a duel."
  join-cooldown: "&cWait &f{seconds}s &cbefore opening another queue."
  leave-penalty: "&cWait &f{seconds}s &cbefore opening another queue."
  rematch-blocked: "&cYou can't rematch that player yet."
  not-found: "&cThat queue is no longer available. Use &f/cd list &cto browse active entries."
  owner-offline: "&cThat queue is no longer available."
  own-entry: "&cYou can't join your own queue."
  disabled-mode: "&cThat duel mode is disabled right now."
  no-default-arena-template: "&cArena queues are not available because no default arena template is configured."
  join-started: "&eJoining &f{owner}'s &e{mode} queue..."
  random-none: "&cThere are no queues you can join right now."
  random-joining: "&eJoining a random queue: &f{owner} &7({mode})"
  gui-refresh-cooldown: "&cWait &f{seconds}s &cbefore refreshing again."

duel:
  preparing: "&eSetting up the duel..."
  teleporting: "&eTeleporting players..."
  started: "&aFight!"
  won: "&aYou beat {opponent}!"
  lost: "&cYou lost to {opponent}."
  arena-won: "&aYou won the arena duel against {opponent}!"
  arena-lost: "&cYou lost the arena duel to {opponent}."
  surrendered: "&cYou surrendered."
  cancelled: "&cDuel cancelled: {reason}"
  no-session: "&cYou're not in a duel right now."
  no-safe-spawn: "&cCouldn't find a safe Wild spawn."
  provision-failed: "&cCouldn't prepare the arena."
  teleport-failed: "&cCouldn't start the duel because teleporting failed."
  arena-title-win-title: "&aVictory"
  arena-title-win-subtitle: "&fYou beat {opponent}"
  arena-title-lose-title: "&cDefeat"
  arena-title-lose-subtitle: "&fLost to {opponent}"

admin:
  reload-done: "&aCookieDuel configs reloaded."
  reload-failed: "&cReload failed: &f{reason}"
  no-permission: "&cYou don't have permission for that."
  forcestop-done: "&eStopped the duel for &f{player}&e."
  forcestop-missing: "&cThat player is not in a duel session."
  cleanup-started: "&eCleaning up leftover duel worlds..."
  cleanup-done: "&aCleanup finished. Removed &f{count}&a leftover duel worlds."
  cleanup-failed: "&cCleanup failed: &f{reason}"

gui:
  queue-browser:
    title: "&8CookieDuel Queues"
    entry-name: "&e{owner}"
    entry-lore:
      - "&7Player: &f{owner}"
      - "&7Mode: &f{mode}"
      - "&7Money: &f{money}"
      - ""
      - "&eClick to join this queue."
    profile-name: "&6Your Profile"
    profile-lore:
      - "&7Player: &f{player}"
      - "&7Money: &f{money}"
      - "&7Kills: &f{kills}"
      - "&7Deaths: &f{deaths}"
      - "&7Points: &f{points}"
    stat-fallback: "N/A"
    previous-name: "&ePrevious page"
    previous-lore:
      - "&7Go to the previous page."
    next-name: "&eNext page"
    next-lore:
      - "&7Go to the next page."
    refresh-name: "&bRefresh"
    refresh-lore:
      - "&7Reload the queue list."
      - "&7Cooldown: 5 seconds."
    border-name: " "
