# Extra blocks to avoid for Wild spawns.
# Use Bukkit material names like MAGMA_BLOCK or SWEET_BERRY_BUSH.
# These group aliases are also supported: tag:leaves, tag:fences, tag:walls
# floor-blacklist: blocks players should never spawn on
# body-blacklist: blocks that make the spawn space cramped or awkward
# nearby-blacklist: blocks that make the nearby fight area unsafe or annoying

wild:
  floor-blacklist:
    - CACTUS
    - MAGMA_BLOCK
    - CAMPFIRE
    - SOUL_CAMPFIRE
    - LAVA
    - FIRE
    - SOUL_FIRE
    - POWDER_SNOW
    - COBWEB
    - SWEET_BERRY_BUSH
    - POINTED_DRIPSTONE
    - IRON_BARS
    - tag:leaves
    - tag:fences
    - tag:walls

  body-blacklist:
    - LAVA
    - FIRE
    - SOUL_FIRE
    - COBWEB
    - POWDER_SNOW
    - SWEET_BERRY_BUSH
    - POINTED_DRIPSTONE
    - CACTUS
    - IRON_BARS
    - tag:leaves
    - tag:fences
    - tag:walls

  nearby-blacklist:
    - CACTUS
    - MAGMA_BLOCK
    - CAMPFIRE
    - SOUL_CAMPFIRE
    - LAVA
    - FIRE
    - SOUL_FIRE
    - COBWEB
    - POWDER_SNOW
    - SWEET_BERRY_BUSH
    - POINTED_DRIPSTONE
    - IRON_BARS
    - tag:leaves
    - tag:fences
    - tag:walls
