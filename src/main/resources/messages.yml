# Player and admin messages.
# Keep placeholders like {queue}, {player}, {opponent}, {seconds}, {reason}, and {count}.

queue:
  joined: "&aJoined queue: &f{queue}"
  left: "&eYou left the queue."
  not-in-queue: "&cYou're not in a queue."
  already-in-queue: "&cYou're already in that queue."
  in-session: "&cYou can't join a queue while you're in a duel."
  queue-not-found: "&cUnknown queue: &f{queue}"
  queue-disabled: "&cThat queue is disabled."
  join-cooldown: "&cWait &f{seconds}s &cbefore joining a queue again."
  leave-penalty: "&cWait &f{seconds}s &cbefore queueing again."
  rematch-blocked: "&cYou can't rematch this opponent yet."

confirm:
  found: "&6Match found: &f{opponent}&6. Use &a/cookieduel accept &6or &c/cookieduel deny&6."
  accepted-self: "&aDuel accepted."
  accepted-other: "&e{player} accepted the duel."
  denied: "&cThe duel was declined."
  timeout: "&cThe duel request timed out."
  not-pending: "&cYou don't have a duel request waiting."

duel:
  preparing: "&eSetting up the duel..."
  teleporting: "&eTeleporting players..."
  started: "&aFight!"
  won: "&aYou beat {opponent}!"
  lost: "&cYou lost to {opponent}."
  surrendered: "&cYou surrendered."
  cancelled: "&cDuel cancelled: {reason}"
  no-session: "&cYou're not in a duel right now."
  no-safe-spawn: "&cCouldn't find a safe Wild spawn."
  provision-failed: "&cCouldn't prepare the arena instance."
  teleport-failed: "&cCouldn't start the duel because teleporting failed."

admin:
  reload-done: "&aCookieDuel configs reloaded."
  no-permission: "&cYou don't have permission for that."
  forcestop-done: "&eStopped the duel for &f{player}&e."
  forcestop-missing: "&cThat player is not in a duel session."
  cleanup-started: "&eCleaning up leftover duel worlds..."
  cleanup-done: "&aCleanup finished. Removed &f{count}&a leftover duel worlds."
