# Queue list.
# mode can be WILD or ARENA_INSTANCE.
# ARENA_INSTANCE queues also need a template id.

queues:
  wild-basic:
    enabled: true
    display-name: "Wild Basic"
    mode: "WILD"
    confirm-required: true

  boxed-instance:
    enabled: true
    display-name: "Boxed Instance"
    mode: "ARENA_INSTANCE"
    template: "default"
    confirm-required: true
